name: Publish to npm

on:
  push:
    branches:
      - main

concurrency:
  group: npm-publish-main
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js (tsdown requires >= 22.18.0)
        uses: actions/setup-node@v4
        with:
          node-version: 22.18.0
          registry-url: https://registry.npmjs.org

      - name: Install npm CLI for trusted publishing
        run: npm install -g npm@latest

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Check if current version already exists on npm
        id: npm_version
        shell: bash
        run: |
          PACKAGE_NAME="$(node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json','utf8'));process.stdout.write(p.name)")"
          PACKAGE_VERSION="$(node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json','utf8'));process.stdout.write(p.version)")"
          echo "package_name=${PACKAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "package_version=${PACKAGE_VERSION}" >> "$GITHUB_OUTPUT"
          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version > /dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "Version ${PACKAGE_VERSION} already published. Skipping npm publish."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.npm_version.outputs.already_published == 'false'
        shell: bash
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # Use Automation token when set; otherwise npm trusted publishing (OIDC).
          # Do not export empty NODE_AUTH_TOKEN — that blocks OIDC and causes ENEEDAUTH.
          if [ -n "$NPM_TOKEN" ]; then
            export NODE_AUTH_TOKEN="$NPM_TOKEN"
          fi
          npm publish --access public --provenance
        # Trusted publishing: npmjs.com/package/@spkm/ui -> Settings -> Trusted publishing
        # Fallback token: npm Automation token (classic), org spkm read/write

      - name: Skip publish (version already exists)
        if: steps.npm_version.outputs.already_published == 'true'
        run: echo "No publish needed for ${{ steps.npm_version.outputs.package_name }}@${{ steps.npm_version.outputs.package_version }}"
